<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set a New Password — Liberia Talent Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>try{document.documentElement.setAttribute("data-theme", localStorage.getItem("ltq_theme") || "dark");}catch(e){}</script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="site-nav">
    <div class="wrap">
      <a class="brand" href="index.html"><img src="assets/logo-icon.png" alt="Liberia Talent Quest" /> Liberia Talent Quest</a>
      <ul class="nav-links" id="navLinks">
      </ul>
      <div class="nav-auth" id="navAuth"></div>
    </div>
  </nav>

  <div class="wrap">
    <div class="auth-card">
      <h2>Set a new password</h2>
      <p class="sub">You logged in with a temporary password. Choose a new one to continue.</p>
      <div id="alertBox"></div>
      <form id="pwForm">
        <div class="field">
          <label for="currentPassword">Temporary password</label>
          <div class="pass-input-wrap">
            <input type="password" id="currentPassword" required placeholder="••••••••" />
            <button type="button" class="pass-toggle" aria-label="Show password" data-for="currentPassword">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label for="newPassword">New password</label>
          <div class="pass-input-wrap">
            <input type="password" id="newPassword" required minlength="6" placeholder="At least 6 characters" />
            <button type="button" class="pass-toggle" aria-label="Show password" data-for="newPassword">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="pwBtn">Save and continue</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.querySelectorAll('.pass-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const inp = document.getElementById(btn.dataset.for);
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        btn.innerHTML = show
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      });
    });

    const auth = getAuth();
    if (!auth || !auth.role) window.location.href = 'login.html';

    const form = document.getElementById('pwForm');
    const alertBox = document.getElementById('alertBox');
    const pwBtn = document.getElementById('pwBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.innerHTML = '';
      pwBtn.disabled = true;
      pwBtn.textContent = 'Saving…';

      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;

      try {
        const res = await authFetch('/api/auth/change-password', {
          method: 'POST',
          body: JSON.stringify({ currentPassword, newPassword })
        });
        const data = await res.json();

        if (!res.ok) {
          alertBox.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
        } else {
          auth.mustChangePassword = false;
          setAuth(auth);
          window.location.href = dashboardUrlForRole(auth.role);
        }
      } catch (err) {
        alertBox.innerHTML = '<div class="alert alert-error">Could not reach the server. Try again.</div>';
      } finally {
        pwBtn.disabled = false;
        pwBtn.textContent = 'Save and continue';
      }
    });
  </script>
</body>
</html>
