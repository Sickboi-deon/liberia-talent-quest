<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Liberia Talent Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>try{document.documentElement.setAttribute("data-theme", localStorage.getItem("ltq_theme") || "dark");}catch(e){}</script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="site-nav">
    <div class="wrap">
      <a class="brand" href="index.html"><img src="assets/logo-icon.png" alt="Liberia Talent Quest" /> Liberia Talent Quest</a>
      <button class="nav-toggle" aria-label="Toggle menu">Menu</button>
      <ul class="nav-links" id="navLinks">
      </ul>
      <div class="nav-auth" id="navAuth"></div>
    </div>
  </nav>

  <div class="wrap">
    <div class="auth-card">
      <h2>Reset your password</h2>
      <p class="sub">Enter the email on your account and we'll send a reset link.</p>
      <div id="alertBox"></div>
      <form id="forgotForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Send reset link</button>
      </form>
      <p class="form-note"><a href="login.html">Back to login</a></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const form = document.getElementById('forgotForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.innerHTML = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      const email = document.getElementById('email').value;

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (!res.ok) {
          alertBox.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send reset link';
        } else {
          alertBox.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
          form.reset();
          submitBtn.textContent = 'Sent';
        }
      } catch (err) {
        alertBox.innerHTML = '<div class="alert alert-error">Could not reach the server. Try again.</div>';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
