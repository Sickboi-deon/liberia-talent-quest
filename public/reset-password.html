<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Liberia Talent Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>try{document.documentElement.setAttribute("data-theme", localStorage.getItem("ltq_theme") || "dark");}catch(e){}</script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="site-nav">
    <div class="wrap">
      <a class="brand" href="index.html"><img src="assets/logo-icon.png" alt="Liberia Talent Quest" /> Liberia Talent Quest</a>
      <button class="nav-toggle" aria-label="Toggle menu">Menu</button>
      <ul class="nav-links" id="navLinks">
      </ul>
      <div class="nav-auth" id="navAuth"></div>
    </div>
  </nav>

  <div class="wrap">
    <div class="auth-card">
      <h2>Set a new password</h2>
      <p class="sub" id="subText">Choose a new password for your account.</p>
      <div id="alertBox"></div>
      <form id="resetForm">
        <div class="field">
          <label for="newPassword">New password</label>
          <div class="pass-input-wrap">
            <input type="password" id="newPassword" required minlength="6" placeholder="At least 6 characters" />
            <button type="button" class="pass-toggle" aria-label="Show password" data-for="newPassword">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Reset password</button>
      </form>
      <p class="form-note" id="bottomLink"><a href="login.html">Back to login</a></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.querySelectorAll('.pass-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const inp = document.getElementById(btn.dataset.for);
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        btn.innerHTML = show
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      });
    });

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const form = document.getElementById('resetForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    if (!token) {
      document.getElementById('subText').textContent = 'This reset link is missing its token.';
      form.classList.add('hidden');
      alertBox.innerHTML = '<div class="alert alert-error">Open the link from your email again, or request a new one.</div>';
      document.getElementById('bottomLink').innerHTML = '<a href="forgot-password.html">Request a new reset link</a>';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.innerHTML = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';

      const newPassword = document.getElementById('newPassword').value;

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();

        if (!res.ok) {
          alertBox.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
          document.getElementById('bottomLink').innerHTML = '<a href="forgot-password.html">Request a new reset link</a>';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset password';
        } else {
          alertBox.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
          form.classList.add('hidden');
          setTimeout(() => { window.location.href = 'login.html'; }, 1800);
        }
      } catch (err) {
        alertBox.innerHTML = '<div class="alert alert-error">Could not reach the server. Try again.</div>';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset password';
      }
    });
  </script>
</body>
</html>
